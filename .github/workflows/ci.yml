name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: install
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"
      - name: ruff
        run: ruff check .
      - name: pytest (no GPU)
        run: pytest -ra --maxfail=1 tests/
      - name: audit audio (blocking)
        run: python scripts/audit_audio.py

  audit-licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"
          pip install pip-licenses
          pip-licenses --fail-on=GPL,AGPL
